<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Sketchbooks - Ruths website</title>
    
    <style>
        /* --- עיצוב כללי --- */
        body {
            background-color: rgb(0, 0, 0); /* הסגול שבחרת */
            font-family: 'Courier New', Courier, monospace;
            color: white;
            margin: 0;
            padding: 20px;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 40px; /* רווח נעים בין סדרה לסדרה */
            width: 100%; /* נותן לתוכן להתפרס על כל המסך */
            box-sizing: border-box; 
        }

        /* --- מסגרת עדינה רק לכותרות --- */
        /* --- מסגרת עדינה ומרכוז לכותרות --- */
        h1, h2 {
            margin: 0 auto 10px auto; /* ה-auto מימין ושמאל ממורכז אותן לאמצע */
            font-weight: normal;
            color: rgb(255, 255, 255);
            display: table; /* שומר על המסגרת צמודה לטקסט */
            padding: 5px 15px;
            border: 1px solid black;
            text-align: center; /* ממורכז את הטקסט עצמו */
        }

        h1 { font-size: 24px; }
        h2 { font-size: 20px; }

        /* --- כפתור חזרה - מרכוז --- */
        .back-link {
            font-size: 16px;
            text-align: center; /* שונה לאמצע במקום לשמאל */
            margin-top: 20px;
        }
        
        /* --- כפתור חזרה - מסגרת לבנה --- */
        .back-link a {
            color: white;
            text-decoration: none;
            border: 1px solid white; /* המסגרת שונתה ללבן */
            padding: 5px 15px;
        }

        .back-link a:hover {
            color: rgb(0, 0, 0);
            background-color: white;
        }

        /* --- עיצוב אזור הגלילה (מסגרת עדינה לכלל הציורים) --- */
        .slider-wrapper {
            display: flex;
            align-items: center;
            border: 1px solid black; /* המסגרת העדינה שעוטפת את כל הציורים יחד */
            padding: 10px;
            gap: 10px;
        }

        .slider-button {
            background: none;
            border: none;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            padding: 10px;
            transition: color 0.2s;
        }

        .slider-button:hover {
            color: rgb(255, 255, 255);
        }

        /* -- החלף את אלו בקובץ ה-CSS שלך -- */

.scroll-area {
    /* מוודא שהתמונות מיושרות לתחתית (למטה) */
    display: flex;
    gap: 15px;
    overflow-x: auto;
    scroll-behavior: smooth;
    padding-bottom: 10px;
    flex: 1;
    scrollbar-width: none;
    align-items: flex-end; /* !!! זה המפתח ליישור למטה !!! */
}

.image-frame {
    /* מוודא שהמסגרת לא חוסמת את התמונה */
    display: inline-block;
    flex: 0 0 auto; /* מונע התכווצות */
    padding: 5px;
    width: auto; /* !!! חשוב: מסירים כל רוחב קבוע !!! */
}

.image-frame img {
    /* קביעת הגובה האחיד. שחקי עם המספר (למשל 200px או 300px) כדי לשלוט בגודל */
    height: 250px; /* !!! זה קובע את הגובה האחיד לכולן !!! */
    width: auto; /* הולך לפי הפרופורציה של התמונה המקורית */
    display: block;
    /* המסגרת השחורה העדינה סביב כל ציור (כמו בסקיצה שלך) */
    border: 1px solid black; 
}

    </style>

<script>
    function slide(button, direction) {
        const wrapper = button.parentElement;
        const scrollArea = wrapper.querySelector('.scroll-area');
        const scrollAmount = direction * 270; 
        scrollArea.scrollBy({ left: scrollAmount, behavior: 'smooth' });
    }
</script>
