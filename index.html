        /* --- הגדרות כלליות --- */
        body {
            background-color: rgb(0, 205, 18); /* הירוק שבחרת */
            font-family: 'Courier New', Courier, monospace; /* הפונט מהסקיצה */
            color: white; /* טקסט לבן */

        }

        /* קונטיינר ראשי שמסדר את כל התיבות אחת מתחת לשנייה */
        .container {
            display: flex;
            flex-direction: column;
            gap: 10px; /* הרווח בין התיבות השונות */
        }

        /* --- עיצוב התיבות --- */
        .box {
            border: 1px solid black; /* המסגרת השחורה הדקה */
            padding: 20px; /* מרווח פנימי בתוך כל תיבה */
        }

        /* --- אזור האמצע (תפריט + תמונה) --- */
        .middle-section {
            display: flex;
            gap: 10px; /* רווח בין קוביית התפריט לקוביית התמונה */
        }

        .nav-links {
            flex: 1; /* תופס חצי מהרוחב */
        }

        .image-box {
            flex: 1; /* תופס את החצי השני */
            padding: 0; /* מאפסים את הריווח כדי שהתמונה תמלא הכל */
            display: flex;
        }

        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* מוודא שהתמונה תשב טוב בתוך התיבה */
        }

        /* --- עיצוב טקסט ורשימות --- */
        h1, h2 {
            margin: 0;
            font-weight: normal;
        }

        h1 { font-size: 28px; }
        h2 { font-size: 22px; }

        ul {
            list-style-type: none; /* מעלים את הנקודות המכוערות */
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 20px; /* ריווח בין שורות התפריט */
            font-size: 25px;
        }

        a {
            color: white;
            text-decoration: none; /* מוריד קו תחתון מקישורים */
        }

        a:hover {
            color: black; /* כשעוברים עם העכבר זה יהפוך לשחור */
        }

        /* --- סרגל קישורים תחתון --- */
        .bottom-links {
            display: flex;
            justify-content: space-between; /* מפזר את המילים שווה בשווה על השורה */
            align-items: center;

<script>
    function copyToClipboard(event, textToCopy) {
        event.preventDefault(); // מונע מהדף "לקפוץ" למעלה כשלוחצים על הקישור
        
        // הפקודה שמעתיקה ללוח
        navigator.clipboard.writeText(textToCopy).then(function() {
            // שומרים את הטקסט המקורי (למשל "gmail" או המספר)
            let originalText = event.target.innerText;
            
            // משנים את הטקסט לחיווי שההעתקה הצליחה
            event.target.innerText = "copied!";
            
            // מחזירים את הטקסט המקורי אחרי 2 שניות (2000 מילישניות)
            setTimeout(function() {
                event.target.innerText = originalText;
            }, 2000);
        }).catch(function() {
            alert("Oops! couldn't copy."); // למקרה שמשהו משתבש
        });
    }
</script>
